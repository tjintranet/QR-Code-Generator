<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code PDF Generator</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
</head>

<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                        <h1 class="card-title mb-0">QR Code Generator</h1>
                        <button id="clearData" class="btn btn-outline-light btn-sm">
                            <i class="bi bi-trash me-1"></i>Clear Data
                        </button>
                    </div>
                    <div class="card-body">

                        <!-- Text input -->
                        <div class="mb-4">
                            <label for="textInput" class="form-label">Enter text below:</label>
                            <textarea class="form-control" id="textInput" rows="2"
                                placeholder="Enter the text you want to encode in the QR code"></textarea>
                            <div class="d-flex justify-content-between mt-1">
                                <small class="text-muted">Recommended: keep content under 300 characters for reliable scanning</small>
                                <small id="charCount" class="text-muted">0 chars</small>
                            </div>
                        </div>

                        <!-- Output size -->
                        <div class="mb-4">
                            <label for="sizeInput" class="form-label">Output size (mm):</label>
                            <div class="input-group" style="max-width: 180px;">
                                <input type="number" class="form-control" id="sizeInput"
                                    value="10" min="5" max="50" step="1">
                                <span class="input-group-text">mm &times; mm</span>
                            </div>
                            <small class="text-muted">Square output — width and height are equal. Range: 5–50mm.</small>
                        </div>

                        <!-- QR preview -->
                        <div id="qrPreview" class="text-center">
                            <h5>QR Code Preview:</h5>
                            <div id="qrcode" class="d-flex justify-content-center mb-3">
                                <canvas id="qrCanvas" class="border"></canvas>
                            </div>
                            <div>
                                <button id="downloadPdf" class="btn btn-success btn-lg" disabled>
                                    <i class="bi bi-download me-2"></i><span id="downloadLabel">Download as PDF (10mm &times; 10mm)</span>
                                </button>
                            </div>
                        </div>

                        <div id="errorMessage" class="alert alert-danger mt-3" style="display: none;"></div>
                        <div id="statusMessage" class="alert alert-info mt-3" style="display: none;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- QRious Library for QR Code Generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <!-- jsPDF for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script>
        let qr = null;
        let currentText = '';
        let debounceTimer = null;

        // ── Initialise QR preview canvas ──────────────────────────────────────
        function initQR() {
            const canvas = document.getElementById('qrCanvas');
            qr = new QRious({
                element: canvas,
                size: 200,
                value: '',
                foreground: '#000000',
                background: '#ffffff',
                level: 'M'
            });
        }

        // ── Helpers ───────────────────────────────────────────────────────────
        function getTargetMM() {
            const raw = parseFloat(document.getElementById('sizeInput').value);
            if (isNaN(raw) || raw < 5)  return 5;
            if (raw > 50)              return 50;
            return raw;
        }

        function updateDownloadLabel() {
            const mm = getTargetMM();
            document.getElementById('downloadLabel').textContent =
                'Download as PDF (' + mm + 'mm \u00d7 ' + mm + 'mm)';
        }

        function updateCharCount(text) {
            const len = text.length;
            const el = document.getElementById('charCount');
            el.textContent = len + ' chars';
            if      (len === 0)  el.className = 'text-muted';
            else if (len <= 300) el.className = 'text-success';
            else if (len <= 500) el.className = 'text-warning';
            else                 el.className = 'text-danger';
        }

        // ── Event listeners ───────────────────────────────────────────────────
        document.getElementById('textInput').addEventListener('input', function () {
            updateCharCount(this.value);
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(generateQRCode, 300);
        });

        // Select all text on focus so the user can type straight over it
        // without having to manually clear the field first.
        document.getElementById('textInput').addEventListener('focus', function () {
            this.select();
        });

        document.getElementById('sizeInput').addEventListener('input', function () {
            // Clamp to valid range
            const v = parseFloat(this.value);
            if (!isNaN(v)) {
                if (v < 5)  this.value = 5;
                if (v > 50) this.value = 50;
            }
            updateDownloadLabel();
        });

        // Also handle the size spinner arrows (change fires after arrow click)
        document.getElementById('sizeInput').addEventListener('change', updateDownloadLabel);

        document.getElementById('downloadPdf').addEventListener('click', downloadAsPDF);
        document.getElementById('clearData').addEventListener('click', clearAllData);

        // ── QR generation ─────────────────────────────────────────────────────
        function generateQRCode() {
            const text = document.getElementById('textInput').value.trim();

            if (!text) {
                if (qr) qr.value = '';
                document.getElementById('downloadPdf').disabled = true;
                hideError();
                return;
            }

            try {
                currentText = text;
                hideError();
                if (qr) qr.value = text;
                document.getElementById('downloadPdf').disabled = false;
            } catch (error) {
                showError('Error generating QR code: ' + error.message);
                console.error(error);
            }
        }

        // ── PDF download ──────────────────────────────────────────────────────
        function downloadAsPDF() {
            if (!currentText || !qr) {
                showError('Please enter some text to generate a QR code first.');
                return;
            }

            const rawSize = parseFloat(document.getElementById('sizeInput').value);
            if (isNaN(rawSize) || rawSize < 5 || rawSize > 50) {
                showError('Please enter a valid size between 5 and 50mm.');
                document.getElementById('sizeInput').focus();
                return;
            }

            try {
                showStatus('Creating PDF...');

                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF();

                const targetMM = getTargetMM();

                // Render QR at 300 DPI for crisp print output
                // pixels = mm × (300 / 25.4)
                const sizePx = Math.round(targetMM * (300 / 25.4));
                const pdfCanvas = document.createElement('canvas');
                new QRious({
                    element: pdfCanvas,
                    size: sizePx,
                    value: currentText,
                    foreground: '#000000',
                    background: '#ffffff',
                    level: 'M'
                });

                const imgData = pdfCanvas.toDataURL('image/png');

                // jsPDF's addImage expects mm — pass targetMM directly
                pdf.addImage(imgData, 'PNG', 20, 20, targetMM, targetMM);

                // Supplementary text below the QR code
                pdf.setFontSize(10);
                const textY = 20 + targetMM + 15;
                pdf.text('QR Code Content:', 20, textY);

                const maxWidth = 170;
                const lines = pdf.splitTextToSize(currentText, maxWidth);
                pdf.text(lines, 20, textY + 10);

                const finalTextY = textY + 10 + (lines.length * 5);
                pdf.text('Size: ' + targetMM + 'mm \u00d7 ' + targetMM + 'mm', 20, finalTextY + 10);
                pdf.text('Generated: ' + new Date().toLocaleString(), 20, finalTextY + 20);

                // File name reflects the chosen size
                pdf.save('qr-code-' + targetMM + 'mm.pdf');

                hideStatus();
                showSuccess('PDF downloaded!');

            } catch (error) {
                showError('Error creating PDF: ' + error.message);
                console.error(error);
            }
        }

        // ── Clear / reset ─────────────────────────────────────────────────────
        function clearAllData() {
            document.getElementById('textInput').value = '';
            currentText = '';
            document.getElementById('sizeInput').value = 10;

            updateCharCount('');
            updateDownloadLabel();
            hideError();
            hideStatus();

            if (qr) qr.value = '';
            document.getElementById('downloadPdf').disabled = true;
        }

        // ── Status helpers ────────────────────────────────────────────────────
        function showError(message) {
            const el = document.getElementById('errorMessage');
            el.textContent = message;
            el.style.display = 'block';
            hideStatus();
        }

        function hideError() {
            document.getElementById('errorMessage').style.display = 'none';
        }

        function showStatus(message) {
            const el = document.getElementById('statusMessage');
            el.className = 'alert alert-info mt-3';
            el.textContent = message;
            el.style.display = 'block';
        }

        function hideStatus() {
            document.getElementById('statusMessage').style.display = 'none';
        }

        function showSuccess(message) {
            const el = document.getElementById('statusMessage');
            el.className = 'alert alert-success mt-3';
            el.textContent = message;
            el.style.display = 'block';
            setTimeout(hideStatus, 3000);
        }

        // ── Boot ──────────────────────────────────────────────────────────────
        window.addEventListener('load', function () {
            initQR();
            updateCharCount('');
            updateDownloadLabel();
        });
    </script>
</body>
</html>
